name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PlayCourt.sln

      - name: Format check
        run: dotnet format PlayCourt.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build PlayCourt.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PlayCourt.sln --configuration Release --no-build
